<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nebo Engineering & IT Solutions</title>
    <link rel="icon" type="image/png" href="/img/nebo_logo.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <style>
      :root {
        --font-body: 'Inter', sans-serif;
        --font-display: 'Syne', sans-serif;

        /* Dark Mode Variables (Default) */
        --bg-primary: #020617;
        --bg-secondary: #0f172a;
        --bg-subtle: #1e293b;
        --text-main: #f8fafc;
        --text-muted: #94a3b8;
        --border-subtle: rgba(255, 255, 255, 0.1);
        --glass-bg: rgba(15, 23, 42, 0.7);
        --scrollbar-track: #020617;
        --scrollbar-thumb: #1e293b;
        
      }

      /* Light Mode Variables (Pastel Blue & White) */
      [data-theme='light'] {
        --bg-primary: #f0f7ff; /* Pastel Blue */
        --bg-secondary: #ffffff;
        --text-main: #0f172a;
        --text-muted: #475569;
        --border-subtle: rgba(15, 23, 42, 0.1);
        --glass-bg: rgba(255, 255, 255, 0.8);
        --scrollbar-track: #f0f7ff;
        --scrollbar-thumb: #cbd5e1;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        font-family: var(--font-body);
        background-color: var(--bg-primary);
        color: var(--text-main);
        margin: 0;
        overflow-x: hidden;
        transition: background-color 0.4s ease, color 0.4s ease;
      }

      h1, h2, h3, .font-display {
        font-family: var(--font-display);
      }

      /* Dynamic Scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: var(--scrollbar-track);
      }
      ::-webkit-scrollbar-thumb {
        background: var(--scrollbar-thumb);
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #334155;
      }

      .glass {
        background: var(--glass-bg);
        backdrop-filter: blur(12px);
        border: 1px solid var(--border-subtle);
        transition: background 0.4s ease, border 0.4s ease;
      }

      canvas {
        touch-action: none;
      }
    </style>
    <script type="importmap">
    {
      "imports": {
        "three": "https://esm.sh/three@^0.182.0",
        "react/": "https://esm.sh/react@^19.2.3/",
        "react": "https://esm.sh/react@^19.2.3",
        "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
        "react-router-dom": "https://esm.sh/react-router-dom@^7.12.0",
        "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
        "@react-three/fiber": "https://esm.sh/@react-three/fiber@^9.5.0",
        "@react-three/drei": "https://esm.sh/@react-three/drei@^10.7.7",
        "framer-motion": "https://esm.sh/framer-motion@^12.27.1"
      }
    }
    </script>
    <link rel="stylesheet" href="/index.css">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
